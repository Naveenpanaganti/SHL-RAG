services:
  - type: web
    name: shl-rag
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: GEMINI_API_KEY
        sync: false   # set manually in Render dashboard
    pythonVersion: "3.11.9"
